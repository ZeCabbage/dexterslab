<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Offline Observer Hub</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background-color: #000;
      color: #0fc;
      font-family: monospace;
      overflow: hidden;
      cursor: none;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #hud {
      position: absolute;
      top: 10px; left: 10px;
      z-index: 10;
      pointer-events: none;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border: 1px solid rgba(0,255,200,0.5);
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
    }
    .hud-line { margin: 0; }
    .hud-warn { color: #f44; }
    #video { display: none; }
  </style>
</head>
<body>
  <div id="hud">
    <p class="hud-line">◈ OFFLINE OBSERVER V1 ◈</p>
    <p class="hud-line" id="hud-status">Initializing System...</p>
    <p class="hud-line" id="hud-voice">Mic: Waiting...</p>
    <p class="hud-line" id="hud-face">Vision: Offline</p>
    <p class="hud-line" id="hud-fps">FPS: 0</p>
  </div>
  <video id="video" autoplay playsinline></video>
  <canvas id="eye"></canvas>

  <script>
    const canvas = document.getElementById('eye');
    const ctx = canvas.getContext('2d');

    // UI HUD Elements
    const hudStatus = document.getElementById('hud-status');
    const hudVoice = document.getElementById('hud-voice');
    const hudFace = document.getElementById('hud-face');
    const hudFps = document.getElementById('hud-fps');

    // State
    const state = {
      cx: 0, cy: 0, size: 0, // canvas dimensions
      targetX: 0, targetY: 0, targetDilation: 1.0,
      currentX: 0, currentY: 0, currentDilation: 1.0,
      blinkPhase: 0, blinkTarget: 0, lastBlinkTime: 0,
      fps: 0, frames: 0, lastFpsTime: performance.now()
    };

    // Style
    const style = {
      scleraColor: 'rgb(250, 250, 250)',
      scleraShadow: 'rgba(50, 60, 80, 0.6)',
      irisRim: 'rgb(10, 20, 40)',
      irisBase: 'rgb(0, 150, 255)',
      irisHighlight: 'rgb(100, 220, 255)',
      pupilColor: 'rgb(5, 5, 10)',
    };

    // Resize
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      state.cx = canvas.width / 2;
      state.cy = canvas.height / 2;
      state.size = Math.min(canvas.width, canvas.height) * 0.9;
    }
    window.addEventListener('resize', resize);
    resize();

    // Lerp helper
    const lerp = (a, b, t) => a + (b - a) * t;

    // Eye Renderer
    function renderEye(offsetX, offsetY, dilation, blinkPhase) {
      const s = state.size;
      const scleraR = s * 0.45;
      const irisR = s * 0.22;
      const pupilR = s * 0.08 * Math.max(0.4, Math.min(2.0, dilation));
      const ix = state.cx + offsetX;
      const iy = state.cy + offsetY;

      ctx.save();
      ctx.shadowBlur = 0;

      // Sclera
      ctx.fillStyle = style.scleraColor;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, scleraR, 0, Math.PI * 2);
      ctx.fill();

      // Sclera Shadow
      ctx.fillStyle = style.scleraShadow;
      ctx.beginPath();
      ctx.arc(state.cx, state.cy, scleraR, 0, Math.PI * 2);
      ctx.clip();
      ctx.beginPath();
      ctx.ellipse(state.cx, state.cy - scleraR * 0.3, scleraR * 1.5, scleraR * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();

      // Iris Rim
      ctx.fillStyle = style.irisRim;
      ctx.beginPath();
      ctx.arc(ix, iy, irisR, 0, Math.PI * 2);
      ctx.fill();

      // Iris Base
      ctx.fillStyle = style.irisBase;
      ctx.beginPath();
      ctx.arc(ix, iy, irisR * 0.9, 0, Math.PI * 2);
      ctx.fill();

      // Iris Highlight
      ctx.fillStyle = style.irisHighlight;
      ctx.beginPath();
      ctx.arc(ix, iy, irisR * 0.85, 0, Math.PI * 2);
      ctx.arc(ix, iy + irisR * 0.1, irisR * 0.85, 0, Math.PI * 2, true);
      ctx.fill();

      // Pupil
      ctx.fillStyle = style.pupilColor;
      ctx.beginPath();
      ctx.arc(ix, iy, pupilR, 0, Math.PI * 2);
      ctx.fill();

      // Specular Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(ix + irisR * 0.3, iy - irisR * 0.4, irisR * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ix - irisR * 0.4, iy + irisR * 0.2, irisR * 0.08, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // Lids (Blinking)
      if (blinkPhase > 0) {
        ctx.fillStyle = '#000';
        const lidY = scleraR * 1.1;
        const upperLidLimit = state.cy - lidY + (lidY * 2 * blinkPhase);
        const lowerLidLimit = state.cy + lidY - (lidY * 2 * blinkPhase);

        ctx.fillRect(0, 0, canvas.width, upperLidLimit);
        ctx.fillRect(0, lowerLidLimit, canvas.width, canvas.height - lowerLidLimit);
      }
    }

    // Connect to Local edge-daemon via WebSocket
    function connectOfflineDaemon() {
      const ws = new WebSocket('ws://127.0.0.1:8892');
      
      ws.onopen = () => {
        hudStatus.innerText = 'Connected to Edge Daemon';
        hudStatus.className = 'hud-line';
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.sentinel) {
            // Apply a slight simulated drift for sentinel wander
            const t = performance.now() * 0.001;
            state.targetX = Math.sin(t * 1.5) * state.size * 0.15 + Math.sin(t * 0.7) * state.size * 0.05;
            state.targetY = Math.cos(t * 1.2) * state.size * 0.1 + Math.sin(t * 0.5) * state.size * 0.05;
            hudFace.innerText = 'Vision: Scanning...';
          } else {
            // Raw values from python cv2 target tracking
            state.targetX = data.ix;
            state.targetY = data.iy;
            hudFace.innerText = `Vision: Targeted (${data.entityCount} detected)`;
          }

          state.blinkTarget = data.blink;
          state.targetDilation = data.dilation;
          
          if (data.overlayText) {
            hudVoice.innerText = data.overlayText;
            if (data.overlayType === 'ambient') {
                hudVoice.style.color = '#88f';
            } else if (data.overlayType === 'oracle') {
                hudVoice.style.color = '#0fc';
            }
          }

        } catch(e) {}
      };

      ws.onclose = () => {
        hudStatus.innerText = 'Daemon Disconnected (Retrying...)';
        hudStatus.className = 'hud-line hud-warn';
        setTimeout(connectOfflineDaemon, 3000);
      };

      ws.onerror = () => {
        hudStatus.innerText = 'Daemon Error (Is offline_daemon.py running?)';
        hudStatus.className = 'hud-line hud-warn';
      };
    }

    // Main Loop
    function loop(time) {
      // FPS
      state.frames++;
      if (time - state.lastFpsTime >= 1000) {
        state.fps = state.frames;
        state.frames = 0;
        state.lastFpsTime = time;
        hudFps.innerText = `FPS: ${state.fps}`;
      }

      // Procedural Random Blinks
      if (state.blinkTarget === 0 && Math.random() < 0.01 && time - state.lastBlinkTime > 3500) {
        state.blinkTarget = 1;
        state.lastBlinkTime = time;
        setTimeout(() => { if (state.blinkTarget === 1) state.blinkTarget = 0; }, 150);
      }
      
      state.blinkPhase = lerp(state.blinkPhase, state.blinkTarget, 0.3);

      // Smooth tracking towards target
      state.currentX = lerp(state.currentX, state.targetX, 0.15);
      state.currentY = lerp(state.currentY, state.targetY, 0.15);
      state.currentDilation = lerp(state.currentDilation, state.targetDilation, 0.05);

      // Render
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      renderEye(state.currentX, state.currentY, state.currentDilation, state.blinkPhase);

      requestAnimationFrame(loop);
    }

    // Init
    hudStatus.innerText = 'Connecting to Edge Daemon...';
    connectOfflineDaemon();
    requestAnimationFrame(loop);

  </script>
</body>
</html>
